publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  supabase_flutter: ^2.0.0
  google_sign_in: ^6.1.6
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.2
  provider: ^6.0.0

  intl: ^0.18.1
